version: "3.9"

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - analysis-service

  analysis-service:
    build:
      context: ./apps/analysis-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/analysis-service:/app

  # Local Supabase is managed via `supabase start` (Supabase CLI).
  # This compose file is for custom Docker workflows only.
  # For local dev, prefer: npx supabase start
